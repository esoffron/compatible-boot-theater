<!DOCTYPE html>
<html lang="en">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- APPLE BOOT THEATER - MAC MAGAZINE COVER IMAGES         -->
<!-- Modified to display random Mac magazine cover images   -->
<!-- Images extracted from PDFs at https://vintageapple.org -->


<html>
<head>
	<meta charset="UTF-8">
	<title>Apple Boot Theater - Mac Magazine Cover Images</title>
	<link rel="stylesheet" href="boot_theater.css">

	<style>
		#grid img {
			width: 33.33%;
			height: 50%;
			object-fit: contain;
			padding: 0;
			margin: 0;
			background: #000;
			border: 0;
			transition: opacity 0.8s ease-in-out;
			opacity: 1;
		}

		#grid img.fade-out {
			opacity: 0;
		}
	</style>

	<script type='text/javascript' src="mac_mag_cover_images.js"></script>

	<script type='text/javascript'>
		//<![CDATA[

		window.bootTheaterConfig = {
			imageBasePath: 'MacMagCovers/',
			imageFiles: window.MAC_MAG_COVER_IMAGES || [],
			logLabel: 'Mac magazine cover images'
		};

		//]]>
	</script>
	<script type='text/javascript' src="boot_theater_image_rotator.js"></script>
</head>

<body>
	<div id="container">
		<div id="grid">
			<img id="GridImage" />
			<img id="GridImage" />
			<img id="GridImage" />
			<img id="GridImage" />
			<img id="GridImage" />
			<img id="GridImage" />
		</div>
	</div>
</body>
</html>
