<!DOCTYPE html>
<html lang="en">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- APPLE BOOT THEATER - CRACK IMAGES EDITION. Based on idea by Charles Mangin.  -->
<!-- Updated by @soffronoff@mastodon.social                                       -->
<!-- Modified to display random crack screen images from the 4am collection       -->

<html>
<head>
	<meta charset="UTF-8">
	<title>Apple Boot Theater - Crack Images</title>
	<link rel="stylesheet" href="boot_theater.css">

	<style>
		#grid img {
			width: 33.33%;
			height: 50%;
			object-fit: contain;
			padding: 0;
			margin: 0;
			background: #000;
			border: 0;
			transition: opacity 0.8s ease-in-out;
			opacity: 1;
		}

		#grid img.fade-out {
			opacity: 0;
		}
	</style>

	<script type='text/javascript'>
		//<![CDATA[

		function formatCrackImageNumber(num) {
			var str = num.toString();
			while (str.length < 4) {
				str = '0' + str;
			}
			return str;
		}

		window.bootTheaterConfig = {
			imageBasePath: 'https://esoffron.github.io/compatible-boot-theater/crack-img/',
			totalImages: 1147,
			logLabel: 'crack screen images',
			getImagePath: function (imageNum) {
				return this.imageBasePath + 'crackscr-' + formatCrackImageNumber(imageNum) + '.jpg';
			}
		};

		//]]>
	</script>
	<script type='text/javascript' src="boot_theater_image_rotator.js"></script>
</head>

<body>
	<div id="container">
		<div id="grid">
			<img id="GridImage" />
			<img id="GridImage" />
			<img id="GridImage" />
			<img id="GridImage" />
			<img id="GridImage" />
			<img id="GridImage" />
		</div>
	</div>
</body>
</html>
